# --- WEB SETTINGS (JSP) ---
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# --- DATABASE CONNECTION ---
# Pointing to your specific database: TTT_db
spring.datasource.url=jdbc:mysql://localhost:3306/TTT_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Reshan@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA/HIBERNATE SETTINGS ---
# "update" tells Spring to automatically build your tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
